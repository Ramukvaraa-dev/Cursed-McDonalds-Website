        <div class="card__header">

            <h1 id="ai-title" class="glitch" data-glitch="Cursed AI">Cursed AI</h1>
            <div class="badges">
              <span class="badge">chat</span>
              <span class="badge badge--hot">beta</span>
            </div>
          </div>
          <p class="muted">If the AI is asleep, wait ~30s and try again.</p>
        </div>

        <div class="chat-container">
          <div id="chat-box"></div>

          <div class="input-area">
            <input
              id="userInput"
              type="text"
              placeholder="Ask the cursed AI..."
              onkeypress="handleKey(event)"
              autocomplete="off"
            />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
        </div>
