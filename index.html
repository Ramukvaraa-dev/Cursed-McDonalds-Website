<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursed McDonalds Home</title>
    <meta
      name="description"
      content="Official Cursed McDonalds franchise hub with game, lore, updates, and reporting."
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff0000" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/cursed-mcdonalds-logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/cursed-mcdonalds-logo.png" />
    <link rel="apple-touch-icon" href="/assets/images/cursed-mcdonalds-logo.png" />
    <link rel="shortcut icon" href="/assets/images/cursed-mcdonalds-logo.png" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="crt">
    <div class="fx" aria-hidden="true">
      <div class="fx__scanlines"></div>
      <div class="fx__vignette"></div>
      <div class="fx__noise"></div>
    </div>
    <a class="skip" href="#top">Skip to main content</a>
    <div class="scrim" data-js="scrim" hidden></div>

    <aside class="sidebar" data-js="sidebar" aria-label="Site navigation" aria-hidden="true">
      <div class="sidebar__top">
        <div class="sidebar__brand">
          <span class="brand__mark" aria-hidden="true">
            <img class="brand__logo" src="assets/images/cursed-mcdonalds-logo.png" alt="" />
          </span>
          <span class="brand__name glitch" data-glitch="Cursed McDonalds">Cursed McDonalds</span>
        </div>
        <button class="iconbtn" type="button" aria-label="Close sidebar" data-js="sidebarClose">
          <span aria-hidden="true">✕</span>
        </button>
      </div>

      <div class="sidebar__search">
        <input class="search" type="search" placeholder="Search this site" aria-label="Search this site" data-js="search" />
      </div>

      <nav class="sidebar__nav">
        <a class="sidebar__link" href="#twop">Home</a>
        <a class="sidebar__link" href="lore.html">Lore</a>
        <a class="sidebar__link sidebar__sublink" href="diary-1.html">Diary 1</a>
        <a class="sidebar__link" href="information.html">Information</a>
        <a class="sidebar__link" href="report.html">Report</a>
        <a class="sidebar__link" href="https://github.com/Ramukvaraa-dev/Cursed-McDonalds" target="_blank" rel="noreferrer">GitHub Site</a>
        <a class="sidebar__link sidebar__link--hot" href="play.html">Play</a>
      </nav>
    </aside>

    <header class="site-header">
      <div class="container">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true">
            <img class="brand__logo" src="assets/images/cursed-mcdonalds-logo.png" alt="" />
          </span>
          <span class="brand__name glitch" data-glitch="Cursed McDonalds">Cursed McDonalds</span>
        </div>
        <nav class="nav">
          <button class="iconbtn" type="button" aria-label="Open sidebar" data-js="sidebarOpen">
            <span class="iconbtn__bars" aria-hidden="true"></span>
          </button>
          <a class="nav__link" href="play.html">Play</a>
          <a class="nav__link" href="information.html">Information</a>
          <a class="nav__link" href="report.html">Report</a>
          <a class="nav__link" href="lore.html">Lore</a>
          <a class="nav__link" href="https://github.com/Ramukvaraa-dev/Cursed-McDonalds" target="_blank" rel="noreferrer">GitHub Site</a>
          <span class="nav__link user-display">Logged in as: <span data-user-display></span></span>
          <button class="nav__link nav__link--logout" type="button" data-logout-btn>Logout</button>
        </nav>
      </div>
    </header>

    <main class="container" id="top" role="main">
      <!-- your whole existing page content stays here exactly the same -->
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-content">
          <small class="muted">
            © 2023 Cursed McDonalds. All rights reserved. |
            <a href="https://github.com/Ramukvaraa-dev/Cursed-McDonalds" target="_blank" rel="noreferrer">Source Code</a>
          </small>

          <div class="music-player" data-js="musicPlayer">
            <audio id="bgMusic" preload="metadata" loop>
              <source src="assets/audio/bg music.mp3" type="audio/mpeg" />
            </audio>
            <button
              class="music-btn"
              type="button"
              aria-label="Toggle music"
              data-js="musicToggle"
              title="Toggle background music"
            >
              <span class="music-icon" aria-hidden="true">♪</span>
            </button>
          </div>
          <div class="counter-box">
            <span>Customers Processed:</span>
            <strong id="visitor-count">Loading...</strong>
          </div>
        </div>
      </div>
    </footer>

    <script src="auth.js"></script>w
    <script src="script.js"></script>
    <script src="counter.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(() => console.log("Service Worker registered"))
            .catch((err) => console.error("Service Worker failed:", err));
        });
      }
    </script>

    <script>
      const originalTitle = document.title;

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          document.title = "Don't leave...";
        } else {
          document.title = originalTitle;
        }
      });
    </script>
  </body>
</html>
