<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drop the game here</title>
    <meta property="og:title" content="Play | Cursed McDonalds" />
    <meta property="og:description" content="Cursed McDonalds Game" />
    <meta property="og:image" content="/assets/images/logo.png" />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff0000" />
    <link rel="icon" href="../../favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="../images/icon-180.png" />
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: #0a0a0f;
        color: rgba(255, 255, 255, 0.92);
      }
      .box {
        width: min(760px, calc(100% - 32px));
        border-radius: 16px;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        padding: 18px 18px 10px;
        background: rgba(255, 255, 255, 0.04);
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 2px 6px;
        border-radius: 8px;
      }
      .muted {
        color: rgba(255, 255, 255, 0.72);
      }
      ul {
        margin: 10px 0 0;
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <h1>Cursed McDonalds</h1>
        <p>Initializing restaurant systems...</p>
      </div>
    </div>

    <noscript>
      <p style="padding: 2rem; color: red; font-family: monospace; background: black; min-height: 100vh; display: flex; align-items: center;">This website works best with JavaScript enabled.</p>
    </noscript>

    <div class="box">
      <h1>Game placeholder</h1>
      <p class="muted">
        Put your actual game build here, replacing this file:
        <code>cursedmcdonalds/assets/game/index.html</code>
      </p>
      <ul class="muted">
        <li>Keep everything local (no third-party hosts).</li>
        <li>Make sure your build’s entrypoint is <code>index.html</code>.</li>
      </ul>
    </div>
  </body>
</html>
